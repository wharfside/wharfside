<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; }
  /* Force the font onto the SVG's text once injected */
  svg text, svg tspan { font-family: "Bricolage Grotesque", Helvetica, Arial, sans-serif; }
</style>
</head><body>
  <svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B141A"/>
      <stop offset="1" stop-color="#101c25"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16242E"/>
      <stop offset="1" stop-color="#121E27"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0C560"/>
      <stop offset="1" stop-color="#E8B44A"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>


  <!-- ===== LEFT COLUMN: brand + tagline (inside 80px safe area) ===== -->
  <!-- wordmark -->
  <text x="80" y="238" font-family="Bricolage Grotesque, Helvetica, Arial, sans-serif"
        font-size="62" font-weight="700" fill="#EEF3F7" letter-spacing="-1.5">
    wharfside<tspan fill="url(#lamp)">.app</tspan>
  </text>

  <!-- headline -->
  <text x="80" y="332" font-family="Bricolage Grotesque, Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#EEF3F7" letter-spacing="-1">
    Containers that explain
  </text>
  <text x="80" y="382" font-family="Bricolage Grotesque, Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="url(#lamp)" letter-spacing="-1">
    why they crashed.
  </text>

  <!-- subtitle -->
  <text x="80" y="440" font-family="Helvetica, Arial, sans-serif"
        font-size="21" fill="#8CA0AE">
    The AI-native container manager for macOS.
  </text>

  <!-- feature chips -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#B7C5D0">
    <g>
      <rect x="80" y="486" width="196" height="40" rx="20" fill="#18262F" stroke="#22333F"/>
      <text x="104" y="512">On-device AI</text>
    </g>
    <g>
      <rect x="288" y="486" width="188" height="40" rx="20" fill="#18262F" stroke="#22333F"/>
      <text x="312" y="512">No API keys</text>
    </g>
    <g>
      <rect x="488" y="486" width="168" height="40" rx="20" fill="#18262F" stroke="#22333F"/>
      <text x="512" y="512">No cloud</text>
    </g>
  </g>

  <!-- ===== RIGHT COLUMN: diagnosis card mock ===== -->
  <g transform="translate(724, 150)">
    <!-- window -->
    <rect x="0" y="0" width="476" height="340" rx="16" fill="url(#card)" stroke="#22333F" stroke-width="1.5"/>
    <!-- titlebar -->
    <rect x="0" y="0" width="476" height="44" rx="16" fill="#18262F"/>
    <rect x="0" y="28" width="476" height="16" fill="#18262F"/>
    <circle cx="24" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="46" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="68" cy="22" r="6" fill="#28C840"/>
    <text x="98" y="27" font-family="Helvetica, Arial, sans-serif" font-size="14"
          fill="#8CA0AE">Wharfside — Containers</text>

    <!-- container rows -->
    <g font-family="SF Mono, Menlo, monospace" font-size="15">
      <circle cx="28" cy="86" r="5" fill="#35C25E"/>
      <text x="46" y="91" fill="#D8E1E8">api</text>
      <text x="446" y="91" fill="#8CA0AE" text-anchor="end">node:22</text>

      <circle cx="28" cy="118" r="5" fill="#35C25E"/>
      <text x="46" y="123" fill="#D8E1E8">cache</text>
      <text x="446" y="123" fill="#8CA0AE" text-anchor="end">redis:7</text>

      <circle cx="28" cy="150" r="5" fill="#E5484D" filter="url(#glow)"/>
      <text x="46" y="155" fill="#D8E1E8">postgres</text>
      <text x="446" y="155" fill="#E5657A" text-anchor="end">exit 1 · ×3</text>
    </g>

    <!-- diagnosis panel -->
    <rect x="18" y="180" width="440" height="142" rx="10" fill="#12202a" stroke="#22333F"/>
    <text x="36" y="210" font-family="Helvetica, Arial, sans-serif" font-size="15"
          font-weight="700" fill="#EEF3F7">
      <tspan fill="#E8B44A">✦ </tspan>Why did postgres crash?
    </text>
    <text x="322" y="210" font-family="Helvetica, Arial, sans-serif" font-size="11"
          fill="#8CA0AE">on-device</text>

    <text font-family="Helvetica, Arial, sans-serif" font-size="13.5" fill="#B7C5D0">
      <tspan x="36" y="240" font-weight="700" fill="#EEF3F7">Disk full.</tspan>
      <tspan> No space left on device while</tspan>
      <tspan x="36" y="262">writing pg_wal — the admin shutdown was a</tspan>
      <tspan x="36" y="284">symptom, not the cause. Free space on the</tspan>
      <tspan x="36" y="306">data volume, then restart the container.</tspan>
    </text>
  </g>
</svg>
</body></html>
