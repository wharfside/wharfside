# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS 26)
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # Warnings-as-errors is set on Wharfside/WharfsideTests targets in the
      # Xcode project — do NOT pass SWIFT_TREAT_WARNINGS_AS_ERRORS here; the
      # command-line form applies to SPM dependencies too and breaks the build.
      - name: Build app (warnings are errors)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Wharfside.xcodeproj \
            -scheme Wharfside \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: App unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Wharfside.xcodeproj \
            -scheme Wharfside \
            -destination 'platform=macOS,arch=arm64' \
            -skip-testing:WharfsideUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

  analysis-package:
    name: WharfsideAnalysis (swift test)
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Test analysis package
        working-directory: Packages/WharfsideAnalysis
        run: swift test -Xswiftc -warnings-as-errors

      - name: Enforce layer purity (no UI/AI imports in analysis)
        working-directory: Packages/WharfsideAnalysis
        run: |
          if grep -rnE '^\s*import (SwiftUI|FoundationModels|AppKit)' Sources/; then
            echo "::error::WharfsideAnalysis must stay pure — no SwiftUI/FoundationModels/AppKit imports (AI_INTEGRATION.md §2)"
            exit 1
          fi

  lint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Install and run SwiftLint
        run: |
          brew install swiftlint
          swiftlint --strict --reporter github-actions-logging