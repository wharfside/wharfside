# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS 26)
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # Warnings-as-errors is set on Wharfside/WharfsideTests targets in the
      # Xcode project — do NOT pass SWIFT_TREAT_WARNINGS_AS_ERRORS here; the
      # command-line form applies to SPM dependencies too and breaks the build.
      - name: Build app (warnings are errors)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Wharfside.xcodeproj \
            -scheme Wharfside \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: App unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Wharfside.xcodeproj \
            -scheme Wharfside \
            -destination 'platform=macOS,arch=arm64' \
            -skip-testing:WharfsideUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

  analysis-package:
    name: WharfsideAnalysis + RulebookCore (macOS swift test)
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Test analysis package
        working-directory: Packages/WharfsideAnalysis
        run: swift test -c release -Xswiftc -warnings-as-errors

      - name: Test RulebookCore package
        working-directory: Packages/RulebookCore
        run: swift test -c release -Xswiftc -warnings-as-errors

      - name: Verify bundled rulebook signatures
        run: make verify-rulebook

      - name: Enforce layer purity (no UI/AI imports in analysis)
        run: |
          if grep -rnE '^\s*import (SwiftUI|FoundationModels|AppKit)' \
            Packages/WharfsideAnalysis/Sources/ \
            Packages/RulebookCore/Sources/; then
            echo "::error::WharfsideAnalysis and RulebookCore must stay pure — no SwiftUI/FoundationModels/AppKit imports"
            exit 1
          fi

  rulebook-core-linux:
    name: RulebookCore (Linux swift test)
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Test RulebookCore on Linux
        working-directory: Packages/RulebookCore
        run: swift test -c release -Xswiftc -warnings-as-errors

  lint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - name: Install and run SwiftLint
        run: |
          brew install swiftlint
          swiftlint --strict --reporter github-actions-logging

      - name: Validate issue template YAML
        run: |
          for f in .github/ISSUE_TEMPLATE/*.yml; do
            ruby -ryaml -e "YAML.load_file('$f')" \
              && echo "OK: $f" \
              || { echo "::error file=$f::invalid YAML"; exit 1; }
          done

  release:
    name: Sign, Notarize & Package
    runs-on: macos-26
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-test, analysis-package, rulebook-core-linux, lint]
    # softprops/action-gh-release needs contents:write to create the GitHub
    # release; the default GITHUB_TOKEN is read-only unless granted here.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          KEYCHAIN=build.keychain
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm -f cert.p12
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build (Developer ID signed, hardened runtime)
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -o pipefail
          # Manual signing is required: Automatic + Developer ID on the CLI conflicts
          # with SPM package targets (SwiftProtobuf, swift-crypto, etc.) that still
          # expect Apple Development. Empty PROVISIONING_PROFILE_SPECIFIER is correct
          # for Developer ID (no profile).
          # CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO is required because `xcodebuild build`
          # (unlike `archive`/export) auto-injects the com.apple.security.get-task-allow
          # debug entitlement, which the Apple notary service always rejects.
          xcodebuild build \
            -project Wharfside.xcodeproj \
            -scheme Wharfside \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            | xcbeautify --renderer github-actions

      - name: Verify code signature
        run: |
          APP="build/Build/Products/Release/Wharfside.app"
          codesign -dv --verbose=2 "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Notarize
        env:
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -e
          APP="build/Build/Products/Release/Wharfside.app"
          echo "$NOTARY_KEY_P8" > AuthKey.p8
          ditto -c -k --keepParent "$APP" Wharfside.zip

          set +e
          xcrun notarytool submit Wharfside.zip \
            --key AuthKey.p8 \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait \
            --output-format json > notarize-result.json
          NOTARY_EXIT=$?
          cat notarize-result.json
          set -e

          SUBMISSION_ID=$(plutil -extract id raw notarize-result.json 2>/dev/null || true)
          STATUS=$(plutil -extract status raw notarize-result.json 2>/dev/null || true)

          if [ -n "$SUBMISSION_ID" ] && [ "$STATUS" != "Accepted" ]; then
            echo "::group::Notarization log ($SUBMISSION_ID, status: $STATUS)"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key AuthKey.p8 \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID"
            echo "::endgroup::"
          fi

          rm -f AuthKey.p8

          if [ "$NOTARY_EXIT" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization did not succeed (status: $STATUS)"
            rm -f Wharfside.zip
            exit 1
          fi

          xcrun stapler staple "$APP"
          rm -f Wharfside.zip

      - name: Package DMG
        run: |
          set -e
          # The .app (not the DMG) was submitted to notarization and already has
          # its ticket stapled in the previous step. The DMG itself was never
          # submitted, so `stapler staple` on it fails with "Record not found" —
          # Gatekeeper reads the ticket from the stapled .app inside instead.
          # --type install is for installer packages (.pkg) and always rejects a
          # DMG with "no usable signature" since the disk image itself carries no
          # such signature. Assess the stapled .app directly (default type: execute)
          # instead — that's the actual Gatekeeper check that matters to users.
          APP="build/Build/Products/Release/Wharfside.app"
          mkdir -p dist
          hdiutil create -volname Wharfside \
            -srcfolder "$APP" \
            -ov -format UDZO dist/Wharfside.dmg
          spctl -a -vv "$APP"
          shasum -a 256 dist/Wharfside.dmg | tee dist/Wharfside.dmg.sha256

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Wharfside.dmg
            dist/Wharfside.dmg.sha256
          body_path: RELEASE_NOTES.md
          generate_release_notes: true

      - name: Read DMG sha256
        id: dmg-sha
        run: echo "sha256=$(awk '{print $1}' dist/Wharfside.dmg.sha256)" >> "$GITHUB_OUTPUT"

      - name: Bump Homebrew tap
        # Skip pre-release tags (e.g. v0.0.1-rc9) — only stable version tags
        # should be published to the public tap.
        if: ${{ !contains(github.ref_name, '-') }}
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: wharfside
          formula-path: Casks/wharfside.rb
          homebrew-tap: wharfside/homebrew-wharfside
          download-url: https://github.com/wharfside/wharfside/releases/download/${{ github.ref_name }}/Wharfside.dmg
          download-sha256: ${{ steps.dmg-sha.outputs.sha256 }}
          commit-message: |
            {{formulaName}} {{version}}

            Auto-bumped by wharfside/wharfside release workflow.
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
