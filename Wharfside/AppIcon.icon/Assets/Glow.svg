<?xml version="1.0" encoding="UTF-8"?>
<!-- Wharfside icon — glow layer.
     Separate layer so Icon Composer can tune it per appearance:
     prominent in dark, pulled back (~40-50% opacity) in light.
     Centered on the lamp ball (512, 400) to match lamp.svg. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lampGlow" cx="0.5" cy="0.39" r="0.55">
      <stop offset="0"    stop-color="#F5C86A" stop-opacity="0.85"/>
      <stop offset="0.35" stop-color="#E8B44A" stop-opacity="0.35"/>
      <stop offset="0.7"  stop-color="#E8B44A" stop-opacity="0.10"/>
      <stop offset="1"    stop-color="#E8B44A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#lampGlow)"/>
</svg>